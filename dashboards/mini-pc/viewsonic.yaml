                              - type: vertical-stack
                                view_layout:
                                  grid-area: left
                                cards:
                                  - type: entities
                                    <<: *popup_entity_card_styling
                                    entities:
                                      - entity: light.living_room1
                                        <<: *popup_entity
                                      - entity: light.living_room2
