anchors: 
  popup_style: &popup_style
    style: |
      --popup-min-width: 1600px;
      --popup-max-width: 1700px;
      --popup-border-radius: 0px;
    timeout: 10000
    card_mod: 
      style: | 
        ha-dialog {
          --dialog-surface-margin-top: auto !important;
          --popup-border-width: 1px;
          --popup-border-radius: 12px;
          --popup-padding-x: 0px;
          --popup-padding-y: 0px;
          --dialog-content-padding: 20px;
          --vertical-align-dialog: center !important;
          --ha-dialog-scrim-backdrop-filter: hue-rotate(120deg) blur(0.8em) brightness(1.2);
          color: white;
          height: auto !important;
        }
        :host .content { }

  popup_layout_card_options: &popup_layout_card_options
    layout_type: grid
    layout:
      grid-template-columns: 2% 36% 4% 16% 4% 36% 2%
      grid-template-rows: auto
      grid-template-areas: |
        ".  left . center . right  ."

  popup_entity_styling: &popup_entity
    type: custom:slider-entity-row
    hide_state: true
    toggle: true
    step: 5
    min: 5
  
  popup_entity_card_styling: &popup_entity_card_styling
    state_color: true
    show_header_toggle: false
    card_mod:
      style: |
        ha-card {
          border: none;
        }

  big-slider-card-style: &slider_style
      name: "\_"
      transition: 0.3
      color: lightyellow
      colorize: false
      background_color: none
      icon: none
      height: 30
      border_radius: '20px'
      tap_action: none
      hold_action: none

button_card_templates: !include button-card-templates.yaml

kiosk_mode: 
  hide_sidebar: true
  hide_header: true

title: ViewSonic
views:
  - title: ViewSonic
    type: panel 
    background: black
    theme: dark-mode
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 50% 50% 
          grid-template-rows: auto
          grid-template-areas: |
            "header       header"
            "lights       media"
            "printers     printers"
            "column1      column2"
            "bottom_left  bottom_right"
        cards:
          - !include header.yaml

          # Printers area
          - type: grid
            columns: 6
            view_layout:
              grid-area: printers
            cards:
              - type: custom:webrtc-camera
                entity: camera.p1s_alpha_camera
                title: P1S Alpha
                style: ".mode {display: none} .header {top: unset; left: 45%; bottom: 8px}"
                card_mod:
                  style: |
                    ha-card {
                      
                    }
              - type: custom:webrtc-camera
                entity: camera.p1s_bravo_camera
                title: P1S Bravo
                style: ".mode {display: none} .header {top: unset; left: 45%; bottom: 8px}"
                card_mod:
                  style: |
                    ha-card {
                      
                    }

          # Lights area
          - type: horizontal-stack
            view_layout:
              grid-area: lights
            cards:
              - type: vertical-stack
